<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FPS Arena (Simple 3D)</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="hud">
      <div class="row">
        <div><span class="label">Player</span> HP: <span id="playerHp">100</span></div>
        <div><span class="label">Enemy</span> HP: <span id="enemyHp">100</span></div>
        <div>Score: <span id="score">0</span></div>
      </div>
      <div class="row hint">
        Controls: Mouse aim, ↑/↓ move, ←/→ strafe, Space shoot, R restart
      </div>
    </div>

    <div id="crosshair" aria-hidden="true"></div>

    <div id="overlay" role="dialog" aria-modal="true" aria-labelledby="title" aria-describedby="desc">
      <div class="panel">
        <h1 id="title">FPS Arena</h1>
        <p id="desc">Use the mouse to aim. Arrow keys to move (←/→ strafe). Space or right-click to shoot.</p>
        <button id="startBtn" type="button">Start</button>
        <div class="small">Tip: If keys don’t respond, click the game area.</div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
